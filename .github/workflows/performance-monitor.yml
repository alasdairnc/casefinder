name: Performance Monitor

on:
  workflow_dispatch:
    inputs:
      retrieval_health_token:
        description: Retrieval health bearer token
        required: false
        type: string
      perf_health_url:
        description: Retrieval health endpoint URL
        required: false
        default: https://www.casedive.ca/api/retrieval-health
        type: string
  schedule:
    - cron: "*/30 * * * *"

jobs:
  retrieval-health-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance monitor
        env:
          INPUT_RETRIEVAL_HEALTH_TOKEN: ${{ inputs.retrieval_health_token }}
          SECRET_RETRIEVAL_HEALTH_TOKEN: ${{ secrets.RETRIEVAL_HEALTH_TOKEN }}
          INPUT_PERF_HEALTH_URL: ${{ inputs.perf_health_url }}
          SECRET_PERF_HEALTH_URL: ${{ vars.PERF_HEALTH_URL }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_RETRIEVAL_HEALTH_TOKEN:-}" ]; then
            export RETRIEVAL_HEALTH_TOKEN="$INPUT_RETRIEVAL_HEALTH_TOKEN"
          else
            export RETRIEVAL_HEALTH_TOKEN="$SECRET_RETRIEVAL_HEALTH_TOKEN"
          fi
          export PERF_HEALTH_URL="${INPUT_PERF_HEALTH_URL:-${SECRET_PERF_HEALTH_URL:-https://www.casedive.ca/api/retrieval-health}}"

          # Normalize operator-provided values to avoid hidden whitespace/newline auth failures.
          RETRIEVAL_HEALTH_TOKEN="$(printf '%s' "$RETRIEVAL_HEALTH_TOKEN" | tr -d '\r\n' | sed 's/^ *//;s/ *$//')"
          PERF_HEALTH_URL="$(printf '%s' "$PERF_HEALTH_URL" | tr -d '\r\n' | sed 's/^ *//;s/ *$//')"

          # Canonicalize apex domain to www to avoid redirect/auth header loss.
          if [[ "$PERF_HEALTH_URL" == https://casedive.ca/* ]]; then
            PERF_HEALTH_URL="https://www.casedive.ca/${PERF_HEALTH_URL#https://casedive.ca/}"
          fi

          if [ -z "$RETRIEVAL_HEALTH_TOKEN" ]; then
            echo "Missing RETRIEVAL_HEALTH_TOKEN"
            exit 1
          fi

          echo "Using PERF_HEALTH_URL=$PERF_HEALTH_URL"

          status=$(curl -s -o /tmp/retrieval-health.json -w "%{http_code}" \
            -H "Authorization: Bearer $RETRIEVAL_HEALTH_TOKEN" \
            "$PERF_HEALTH_URL")
          echo "retrieval-health HTTP status: $status"

          if [ "$status" != "200" ]; then
            echo "retrieval-health preflight failed; response preview:"
            head -c 300 /tmp/retrieval-health.json || true
            echo
            exit 2
          fi

          npm run perf:monitor
