name: Performance Monitor

on:
  workflow_dispatch:
    inputs:
      retrieval_health_token:
        description: Retrieval health bearer token
        required: true
        type: string
      perf_health_url:
        description: Retrieval health endpoint URL
        required: false
        default: https://www.casedive.ca/api/retrieval-health
        type: string
  schedule:
    - cron: "*/30 * * * *"

jobs:
  retrieval-health-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance monitor
        env:
          INPUT_RETRIEVAL_HEALTH_TOKEN: ${{ inputs.retrieval_health_token }}
          SECRET_RETRIEVAL_HEALTH_TOKEN: ${{ secrets.RETRIEVAL_HEALTH_TOKEN }}
          INPUT_PERF_HEALTH_URL: ${{ inputs.perf_health_url }}
          SECRET_PERF_HEALTH_URL: ${{ vars.PERF_HEALTH_URL }}
        run: |
          export RETRIEVAL_HEALTH_TOKEN="${INPUT_RETRIEVAL_HEALTH_TOKEN:-$SECRET_RETRIEVAL_HEALTH_TOKEN}"
          export PERF_HEALTH_URL="${INPUT_PERF_HEALTH_URL:-$SECRET_PERF_HEALTH_URL}"

          if [ -z "$RETRIEVAL_HEALTH_TOKEN" ]; then
            echo "Missing RETRIEVAL_HEALTH_TOKEN"
            exit 1
          fi

          npm run perf:monitor
