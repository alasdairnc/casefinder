name: 'Overnight Security Loop'

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run security audit'
        required: false
        default: 'true'
  schedule:
    - cron: "0 6 * * *" # 2am ET / 6am UTC nightly

jobs:
  security-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="security-autofix/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Write Claude prompt
        run: |
          cat > /tmp/security-prompt.txt << 'ENDOFPROMPT'
You are running a nightly security audit and fix pass on the CaseDive codebase.

## Your job (two phases)

### Phase 1 - Audit
Score every non-underscore file in api/ against this rubric (100 points total):
- Rate Limiting (20): imports _rateLimit.js with a named bucket string
- Input Validation (20): validateJsonRequest with maxBytes + field checks
- Security Headers (20): applyStandardApiHeaders sets all four headers
- CORS (15): all headers via _cors.js, no inline Access-Control-*
- Fetch Hygiene (15): every fetch() uses AbortSignal.timeout()
- Model ID (10): model string from _constants.js, never hardcoded

### Phase 2 - Fix
For every failing check you find:
1. Apply the minimal fix that makes the check pass
2. Do NOT refactor surrounding code
3. Do NOT add new features or change logic
4. Only modify files in api/ -- no src/, no config files

### Constraints
- Maximum 5 files modified
- If a fix would require changing more than 20 lines in a single file, skip it and note why
- Do not touch _cors.js, _rateLimit.js, _constants.js, or any underscore-prefixed helper
- Do not create new files

### Output
After all fixes, print a markdown report:
- Overall score before and after
- Each file: what was fixed, what was skipped and why
- List any issues that need human review
ENDOFPROMPT

      - name: Run Claude security audit and fix pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat /tmp/security-prompt.txt)" \
            --allowedTools "Read,Edit,Grep,Glob,Bash(ls:*),Bash(cat:api/*)" \
            --max-turns 40 \
            --output-format text 2>&1 | tee claude-security-report.txt

      - name: Check diff size (safety gate)
        id: diff_check
        run: |
          CHANGED=$(git diff --name-only | wc -l | tr -d ' ')
          LINES=$(git diff --stat | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "lines_changed=$LINES" >> "$GITHUB_OUTPUT"
          echo "Files changed: $CHANGED, Lines inserted: $LINES"
          if [ "$CHANGED" -gt 10 ]; then
            echo "Safety gate: too many files changed ($CHANGED > 10). Aborting."
            exit 1
          fi

      - name: Check for changes
        id: has_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No security issues found -- nothing to fix."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit fixes
        if: steps.has_changes.outputs.has_changes == 'true'
        run: |
          git add api/
          CHANGED_COUNT="${{ steps.diff_check.outputs.changed_files }}"
          git commit -m "fix(security): nightly automated security fixes $(date +%Y-%m-%d)

Automated fixes from overnight-security-loop workflow.
Files changed: ${CHANGED_COUNT}

See PR description for full audit report."

      - name: Push branch
        if: steps.has_changes.outputs.has_changes == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: git push origin "$BRANCH"

      - name: Open PR
        if: steps.has_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          CHANGED_FILES: ${{ steps.diff_check.outputs.changed_files }}
        run: |
          REPORT=$(head -100 claude-security-report.txt 2>/dev/null || echo "(no report generated)")
          TITLE="fix(security): nightly security autofix $(date +%Y-%m-%d)"
          BODY="## Overnight Security Loop

Automated security fixes from nightly audit pass.

**Files changed:** ${CHANGED_FILES}

---

## Audit Report

\`\`\`
${REPORT}
\`\`\`

---

> Generated by overnight-security-loop workflow.
> Review before merging -- automated fixes only touch rate limiting, validation, headers, CORS, fetch timeouts, and model ID sourcing."

          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH" \
            --label "security,automated"
