name: Deployment Approval

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployment URL to validate before approval
        required: false
        default: https://www.casedive.ca
        type: string

env:
  PLAYWRIGHT_BASE_URL: ${{ inputs.target_url }}

jobs:
  approve-deployment:
    runs-on: ubuntu-latest
    environment: production-approval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run guardrails
        run: npm run test:guardrails

      - name: Run stable live smoke tests
        run: npm run test:live:stable
