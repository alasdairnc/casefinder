name: Claude PR Review

on:
  workflow_dispatch:
    inputs:
      run_review:
        description: "Manually trigger Claude PR review"
        required: false
        default: "false"

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether Claude review is needed
        id: precheck
        uses: actions/github-script@v7
        with:
          script: |
            const relevantPrefixes = [
              'api/',
              '.github/workflows/',
              'package.json',
              'CLAUDE.md',
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const relevantFiles = files.filter((file) =>
              relevantPrefixes.some((prefix) => file.filename === prefix || file.filename.startsWith(prefix)),
            );

            const runClaude = relevantFiles.length > 0;
            core.setOutput('run_claude', runClaude ? 'true' : 'false');
            core.setOutput('reason', runClaude ? 'relevant-files-present' : 'no-high-risk-files');
            core.setOutput('relevant_files', relevantFiles.map((file) => file.filename).join('\n'));

            if (!runClaude) {
              core.info('Skipping Claude PR review to save tokens: no high-risk files changed.');
            }

      - uses: anthropics/claude-code-action@v1
        if: steps.precheck.outputs.run_claude == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this PR against the casedive architecture rules in CLAUDE.md.

            Check for:
            1. API keys or secrets in src/ (must stay in api/ only)
            2. Any inline CSS or CSS framework imports (project uses inline styles via ThemeContext only)
            3. New API endpoints missing rate limiting (all endpoints must use api/_rateLimit.js)
            4. Fabricated or incorrectly formatted case citations (must use YYYY COURT # neutral format)
            5. Made-up Criminal Code section numbers
            6. Security issues: SQL injection, XSS, command injection, unvalidated inputs
            7. .env or secret files accidentally staged

            Post a concise comment summarising findings. If everything looks good, say so clearly.
            Flag any hard blocks (architecture rule violations) vs. minor suggestions separately.

      - name: Skip summary
        if: steps.precheck.outputs.run_claude != 'true'
        run: |
          echo "Skipping Claude PR review to save tokens."
          echo "Reason: ${{ steps.precheck.outputs.reason }}"
