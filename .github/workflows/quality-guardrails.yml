name: Quality Guardrails

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  sanitizer-and-filter-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sanitizer and retrieval guardrails
        run: npm run test:guardrails

  keyed-filter-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run keyed retrieval quality gate
        env:
          CANLII_API_KEY: ${{ secrets.CANLII_API_KEY }}
        run: |
          if [ -z "$CANLII_API_KEY" ]; then
            echo "CANLII_API_KEY not available; skipping keyed gate for this workflow context."
            exit 0
          fi
          npm run test:filter:keyed
